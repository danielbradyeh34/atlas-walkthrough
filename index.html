<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — Protected</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0320;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #fff;
  }
  .gate {
    text-align: center;
    max-width: 400px;
    padding: 2rem;
  }
  .gate h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .gate p {
    color: #94a3b8;
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .gate input {
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 10px;
    border: 1px solid #2d2250;
    background: #130d2e;
    color: #fff;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .gate input:focus { border-color: #7c3aed; }
  .gate button {
    width: 100%;
    padding: 0.85rem;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .gate button:hover { opacity: 0.9; }
  .error {
    color: #f87171;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    display: none;
  }
  .logo-mark {
    width: 64px; height: 64px;
    background: #0a0320;
    border: 2px solid #2d2250;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 800;
    color: #a78bfa;
    margin-bottom: 1.5rem;
  }
</style>
</head>
<body>
<div class="gate">
  <div class="logo-mark">A</div>
  <h1>ATLAS</h1>
  <p>This content is password protected.<br>Enter the password to continue.</p>
  <form id="gateForm" onsubmit="return unlock(event)">
    <input type="password" id="pw" placeholder="Password" autocomplete="off" autofocus>
    <button type="submit">Unlock</button>
  </form>
  <div class="error" id="err">Incorrect password. Try again.</div>
</div>

const SALT = "J334iRkq7IGRh7GGslQFew==";
const IV = "Eko8p4goe4ZRfKBa";

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: Uint8Array.from(atob(salt), c => c.charCodeAt(0)), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function unlock(e) {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  try {
    const key = await deriveKey(pw, SALT);
    const iv = Uint8Array.from(atob(IV), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
    const html = new TextDecoder().decode(decrypted);
    // Store session so linked pages work
    sessionStorage.setItem("atlas-pw", pw);
    document.open();
    document.write(html);
    document.close();
  } catch {
    document.getElementById("err").style.display = "block";
    document.getElementById("pw").value = "";
    document.getElementById("pw").focus();
  }
  return false;
}

// Auto-unlock if password is in session storage
(async function() {
  const saved = sessionStorage.getItem("atlas-pw");
  if (saved) {
    document.getElementById("pw").value = saved;
    await unlock(new Event("submit"));
  }
})();
